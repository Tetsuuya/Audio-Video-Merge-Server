name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dubbing-merge-server:latest
            ${{ secrets.DOCKER_USERNAME }}/dubbing-merge-server:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set secrets in Azure
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os, sys

          creds_raw = os.environ.get('FIREBASE_CREDENTIALS', '').strip()
          gemini_key = os.environ.get('GEMINI_API_KEY', '').strip()
          minified = json.dumps(json.loads(creds_raw))

          print(f"Setting Azure secrets (gemini_key_len={len(gemini_key)})...")

          result = subprocess.run(
            ['az', 'containerapp', 'secret', 'set',
             '--name', 'dubbing-merge-server',
             '--resource-group', 'web-scrapper-rg',
             '--secrets', f'firebase-credentials={minified}', f'gemini-api-key={gemini_key}'],
            capture_output=True, text=True
          )
          print(result.stdout)
          if result.returncode != 0:
            print(result.stderr, file=sys.stderr)
            sys.exit(1)
          print("Secrets set successfully!")
          PYEOF

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az containerapp update \
              --name dubbing-merge-server \
              --resource-group web-scrapper-rg \
              --image ${{ secrets.DOCKER_USERNAME }}/dubbing-merge-server:${{ github.sha }} \
              --set-env-vars \
                PORT=8080 \
                NODE_ENV=production \
                "SERVER_URL=https://dubbing-merge-server.jollygrass-a22ba7ee.northeurope.azurecontainerapps.io" \
                REPLICATE_API_TOKEN=${{ secrets.REPLICATE_API_TOKEN }} \
                ASSEMBLYAI_API_KEY=${{ secrets.ASSEMBLYAI_API_KEY }} \
                DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }} \
                R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }} \
                R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }} \
                R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }} \
                R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }} \
                R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }} \
                FISH_AUDIO_API_KEY=${{ secrets.FISH_AUDIO_API_KEY }} \
                FISH_AUDIO_MODEL=s2.1-pro-free \
                RESIDENTIAL_PROXY_URL=${{ secrets.RESIDENTIAL_PROXY_URL }} \
                GEMINI_API_KEY=secretref:gemini-api-key \
                GEMINI_MODEL=gemini-flash-lite-latest \
                FIREBASE_CREDENTIALS=secretref:firebase-credentials
