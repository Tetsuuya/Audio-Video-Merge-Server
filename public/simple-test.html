<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Merge Test</title>
<style>
  body { 
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 50px auto;
    padding: 20px;
  }
  #response {
    margin-top: 20px;
    padding: 20px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    white-space: pre-wrap;
    font-family: monospace;
    min-height: 100px;
  }
  #videoLink {
    margin-top: 20px;
    padding: 20px;
    background: #d4edda;
    border: 1px solid #c3e6cb;
    display: none;
  }
  button {
    padding: 12px 24px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
  }
  button:hover {
    background: #0056b3;
  }
  input[type="file"] {
    display: block;
    margin: 10px 0;
  }
</style>
</head>
<body>

<h1>Simple Audio/Video Merge Test</h1>

<div>
  <label><strong>Video File:</strong></label>
  <input type="file" id="videoFile" accept="video/*">
  
  <label><strong>Audio File:</strong></label>
  <input type="file" id="audioFile" accept="audio/*">
  
  <button id="uploadBtn">Upload and Merge</button>
</div>

<div id="response">No request sent yet...</div>
<div id="videoLink"></div>

<script>
console.log('Page loaded');

const uploadBtn = document.getElementById('uploadBtn');
const response = document.getElementById('response');
const videoLink = document.getElementById('videoLink');

uploadBtn.addEventListener('click', async function(e) {
  e.preventDefault();
  e.stopPropagation();
  
  console.log('Button clicked!');
  response.textContent = 'Processing...';
  videoLink.style.display = 'none';
  
  const videoFile = document.getElementById('videoFile').files[0];
  const audioFile = document.getElementById('audioFile').files[0];
  
  if (!videoFile || !audioFile) {
    response.textContent = 'ERROR: Please select both video and audio files!';
    return;
  }
  
  console.log('Files selected:', videoFile.name, audioFile.name);
  
  const formData = new FormData();
  formData.append('video', videoFile);
  formData.append('audio', audioFile);
  formData.append('outputName', `merged_${Date.now()}.mp4`);
  
  try {
    console.log('Sending request to server...');
    const res = await fetch('http://localhost:8080/test/merge-one-upload', {
      method: 'POST',
      body: formData
    });
    
    console.log('Response status:', res.status);
    const result = await res.json();
    console.log('Result:', result);
    
    // Show response
    response.textContent = JSON.stringify(result, null, 2);
    
    // Show download link
    if (result.status === 'success') {
      videoLink.innerHTML = `
        <h3>✓ Success!</h3>
        <p><strong>Download your video:</strong></p>
        <a href="${result.outputUrl}" target="_blank" style="font-size: 18px; color: #007bff; font-weight: bold;">${result.outputUrl}</a>
        <p style="margin-top: 10px;">
          <strong>Processing time:</strong> ${(result.duration / 1000).toFixed(2)}s<br>
          <strong>File size:</strong> ${(result.fileSize / 1024 / 1024).toFixed(2)} MB<br>
          <strong>Duration:</strong> ${result.outputDuration.toFixed(2)}s
        </p>
      `;
      videoLink.style.display = 'block';
    }
    
    console.log('Done!');
  } catch (err) {
    console.error('Error:', err);
    response.textContent = 'ERROR: ' + err.message;
  }
});

console.log('Event listener attached');
</script>

</body>
</html>
