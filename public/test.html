<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dubbing Merge Server — Debug Tool</title>
<style>
  body { 
    margin: 16px; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .layout { display: flex; gap: 24px; }
  .controls { flex: 1; }
  .response-col { flex: 1; }
  .controls hr { margin: 24px 0; }
  #output { 
    border: 1px solid #ccc; 
    padding: 15px; 
    background: #f5f5f5;
    white-space: pre-wrap;
    min-height: 200px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }
  #videoLink {
    margin-top: 15px;
    padding: 15px;
    background: #d4edda;
    border: 1px solid #c3e6cb;
    border-radius: 4px;
    display: none;
  }
  #videoLink a {
    color: #007bff;
    font-weight: bold;
    font-size: 14px;
    word-break: break-all;
  }
  button {
    padding: 8px 16px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover {
    background: #0056b3;
  }
  input[type="file"], select, input[type="text"], textarea {
    font-size: 13px;
  }
</style>
</head>
<body>

<h1>Dubbing Merge Server — Debug Tool</h1>

<div class="layout">

  <div class="controls">

    <h2>Health check</h2>
    <button type="button" onclick="callHealth()">GET /health</button>

    <hr>

    <h2>Single audio + video merge</h2>
    <p>Video: <input type="file" id="oneVideo" accept="video/*"></p>
    <p>Audio: <input type="file" id="oneAudio" accept="audio/*"></p>
    <p>Language:
      <select id="oneLanguage">
        <option value="en-US">English</option>
        <option value="es-ES">Spanish</option>
        <option value="fr-FR">French</option>
        <option value="zh-CN">Chinese</option>
        <option value="ko-KR">Korean</option>
        <option value="ja-JP">Japanese</option>
        <option value="pt-PT">Portuguese</option>
        <option value="pt-BR">Brazilian Portuguese</option>
        <option value="fil-PH">Filipino</option>
      </select>
    </p>
    <button type="button" id="mergeBtn">POST /test/merge-one</button>

    <hr>

    <h2>Multiple audio tracks, one video</h2>
    <p>Video: <input type="file" id="multiVideo" accept="video/*"></p>
    <p>Audio files: <input type="file" id="multiAudios" accept="audio/*" multiple onchange="addAudioFiles(this.files)"></p>
    <div id="languageInputs"></div>
    <button type="button" onclick="callMergeMulti()">POST /test/merge-multi</button>

  </div>

  <div class="response-col">
    <h3>Response:</h3>
    <pre id="output">No requests yet...</pre>
    <div id="videoLink"></div>
  </div>

</div>

<script>
const SERVER = 'http://localhost:8080';
const output = document.getElementById('output');
const videoLink = document.getElementById('videoLink');

// Debug: Log if page is trying to reload
window.addEventListener('beforeunload', function(e) {
  console.log('⚠️ WARNING: Page is trying to unload/reload!');
});

// Debug: Log when page loads
console.log('✓ Page loaded successfully');

// Add event listener to button instead of onclick
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM loaded, attaching event listeners');
  
  const mergeBtn = document.getElementById('mergeBtn');
  if (mergeBtn) {
    mergeBtn.addEventListener('click', async function(e) {
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      console.log('Button clicked via addEventListener');
      
      output.textContent = 'Calling /test/merge-one-upload...';
      videoLink.style.display = 'none';
      
      const videoFile = document.getElementById('oneVideo').files[0];
      const audioFile = document.getElementById('oneAudio').files[0];
      const language = document.getElementById('oneLanguage').value;

      console.log('Files:', videoFile, audioFile);

      if (!videoFile || !audioFile) {
        output.textContent = 'Please select both a video and an audio file.';
        return;
      }

      const formData = new FormData();
      formData.append('video', videoFile);
      formData.append('audio', audioFile);
      formData.append('language', language);
      formData.append('outputName', `merged_${language}_${Date.now()}.mp4`);

      try {
        output.textContent = 'Uploading and processing...';
        console.log('Sending fetch request...');
        const res = await fetch(SERVER + '/test/merge-one-upload', { method: 'POST', body: formData });
        console.log('Got response:', res.status);
        const result = await res.json();
        console.log('Result:', result);
        
        show(result);
        
        if (result.status === 'success' && result.outputUrl) {
          showVideoLink(result.outputUrl, result.outputFile);
        }
      } catch (err) { 
        console.error('Error:', err);
        showError(err);
      }
      
      console.log('Request completed');
    }, false);
    console.log('✓ Event listener attached to merge button');
  }
});

function show(data) {
  output.textContent = JSON.stringify(data, null, 2);
}

function showError(err) {
  output.textContent = 'Error: ' + err.message;
  videoLink.style.display = 'none';
}

function showVideoLink(url, filename) {
  videoLink.innerHTML = `
    <strong>✓ Success!</strong><br><br>
    <strong>Download/View:</strong><br>
    <a href="${url}" target="_blank">${url}</a>
  `;
  videoLink.style.display = 'block';
}

async function callHealth() {
  console.log('callHealth() started');
  output.textContent = 'Calling /health...';
  videoLink.style.display = 'none';
  try {
    const res = await fetch(SERVER + '/health');
    show(await res.json());
  } catch (err) { showError(err); }
}

async function callMergeOne(e) {
  console.log('callMergeOne() started', e);
  if (e) {
    e.preventDefault();
    e.stopPropagation();
  }
  
  output.textContent = 'Calling /test/merge-one-upload...';
  videoLink.style.display = 'none';
  
  const videoFile = document.getElementById('oneVideo').files[0];
  const audioFile = document.getElementById('oneAudio').files[0];
  const language = document.getElementById('oneLanguage').value;

  console.log('Files:', videoFile, audioFile);

  if (!videoFile || !audioFile) {
    output.textContent = 'Please select both a video and an audio file.';
    return false;
  }

  const formData = new FormData();
  formData.append('video', videoFile);
  formData.append('audio', audioFile);
  formData.append('language', language);
  formData.append('outputName', `merged_${language}_${Date.now()}.mp4`);

  try {
    output.textContent = 'Uploading and processing...';
    console.log('Sending fetch request...');
    const res = await fetch(SERVER + '/test/merge-one-upload', { method: 'POST', body: formData });
    console.log('Got response:', res.status);
    const result = await res.json();
    console.log('Result:', result);
    
    show(result);
    
    if (result.status === 'success' && result.outputUrl) {
      showVideoLink(result.outputUrl, result.outputFile);
    }
  } catch (err) { 
    console.error('Error:', err);
    showError(err);
  }
  
  console.log('callMergeOne() finished');
  return false;
}

const LANGUAGE_OPTIONS = [
  { value: 'en-US', label: 'English' },
  { value: 'es-ES', label: 'Spanish' },
  { value: 'fr-FR', label: 'French' },
  { value: 'zh-CN', label: 'Chinese' },
  { value: 'ko-KR', label: 'Korean' },
  { value: 'ja-JP', label: 'Japanese' },
  { value: 'pt-PT', label: 'Portuguese' },
  { value: 'pt-BR', label: 'Brazilian Portuguese' },
  { value: 'fil-PH', label: 'Filipino' },
];

let multiAudioFiles = [];

function addAudioFiles(fileList) {
  for (const file of fileList) {
    multiAudioFiles.push({ file, language: LANGUAGE_OPTIONS[multiAudioFiles.length % LANGUAGE_OPTIONS.length].value });
  }
  document.getElementById('multiAudios').value = '';
  renderLanguageInputs();
}

function removeAudioFile(index) {
  multiAudioFiles.splice(index, 1);
  renderLanguageInputs();
}

function renderLanguageInputs() {
  const container = document.getElementById('languageInputs');
  container.innerHTML = '';

  multiAudioFiles.forEach((entry, i) => {
    const row = document.createElement('p');

    const label = document.createElement('span');
    label.textContent = entry.file.name + '  ';
    row.appendChild(label);

    const select = document.createElement('select');
    select.className = 'lang-select';
    select.dataset.index = i;
    LANGUAGE_OPTIONS.forEach((opt) => {
      const option = document.createElement('option');
      option.value = opt.value;
      option.textContent = opt.label;
      if (opt.value === entry.language) option.selected = true;
      select.appendChild(option);
    });
    select.onchange = () => { entry.language = select.value; };
    row.appendChild(select);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = () => removeAudioFile(i);
    row.appendChild(removeBtn);

    container.appendChild(row);
  });
}

async function callMergeMulti() {
  output.textContent = 'Calling /test/merge-multi...';
  videoLink.style.display = 'none';
  
  const videoFile = document.getElementById('multiVideo').files[0];

  if (!videoFile || multiAudioFiles.length === 0) {
    output.textContent = 'Pick a video and at least one audio file first.';
    return;
  }

  const formData = new FormData();
  formData.append('video', videoFile);
  const languages = [];
  for (const entry of multiAudioFiles) {
    formData.append('audios', entry.file);
    languages.push(entry.language);
  }
  formData.append('languages', JSON.stringify(languages));

  try {
    const res = await fetch(SERVER + '/test/merge-multi', { method: 'POST', body: formData });
    show(await res.json());
  } catch (err) { showError(err); }
}
</script>

</body>
</html>
