<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dubbing Merge Server — Debug Tool</title>
<style>
  body { 
    margin: 16px; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .layout { display: flex; gap: 24px; }
  .controls { flex: 1; }
  .response-col { flex: 1; }
  .controls hr { margin: 24px 0; }
  #output { 
    border: 1px solid #ccc; 
    padding: 15px; 
    background: #f5f5f5;
    white-space: pre-wrap;
    min-height: 200px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }
  #videoLink {
    margin-top: 15px;
    padding: 15px;
    background: #d4edda;
    border: 1px solid #c3e6cb;
    border-radius: 4px;
    display: none;
  }
  #videoLink a {
    color: #007bff;
    font-weight: bold;
    font-size: 14px;
    word-break: break-all;
  }
  button {
    padding: 8px 16px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover {
    background: #0056b3;
  }
  input[type="file"], select, input[type="text"], textarea {
    font-size: 13px;
  }
</style>
</head>
<body>

<h1>Dubbing Merge Server — Debug Tool</h1>

<div class="layout">

  <div class="controls">

    <h2>Health check</h2>
    <button type="button" onclick="callHealth()">GET /health</button>

    <hr>

    <h2>Single audio + video merge</h2>
    
    <p>
      <input type="radio" name="singleMode" id="singleModeUpload" value="upload" checked onchange="toggleSingleMode()">
      <label for="singleModeUpload">Upload Files</label>
      &nbsp;&nbsp;
      <input type="radio" name="singleMode" id="singleModeUrl" value="url" onchange="toggleSingleMode()">
      <label for="singleModeUrl">Use URLs</label>
    </p>

    <div id="singleUploadSection">
      <p>Video: <input type="file" id="oneVideo" accept="video/*"></p>
      <p>Audio: <input type="file" id="oneAudio" accept="audio/*"></p>
    </div>

    <div id="singleUrlSection" style="display: none;">
      <p>Video URL: <input type="text" id="oneVideoUrl" placeholder="https://example.com/video.mp4" style="width: 100%;"></p>
      <p>Audio URL: <input type="text" id="oneAudioUrl" placeholder="https://example.com/audio.mp3" style="width: 100%;"></p>
    </div>

    <p>Language:
      <select id="oneLanguage">
        <option value="en-US">English</option>
        <option value="es-ES">Spanish</option>
        <option value="fr-FR">French</option>
        <option value="zh-CN">Chinese</option>
        <option value="ko-KR">Korean</option>
        <option value="ja-JP">Japanese</option>
        <option value="pt-PT">Portuguese</option>
        <option value="pt-BR">Brazilian Portuguese</option>
        <option value="fil-PH">Filipino</option>
      </select>
    </p>
    <button type="button" id="mergeBtn">POST /test/merge-one</button>

    <hr>

    <h2>Multiple audio tracks, one video</h2>
    
    <p>
      <input type="radio" name="multiMode" id="multiModeUpload" value="upload" checked onchange="toggleMultiMode()">
      <label for="multiModeUpload">Upload Files</label>
      &nbsp;&nbsp;
      <input type="radio" name="multiMode" id="multiModeUrl" value="url" onchange="toggleMultiMode()">
      <label for="multiModeUrl">Use URLs</label>
    </p>

    <div id="multiUploadSection">
      <p>Video: <input type="file" id="multiVideo" accept="video/*"></p>
      <p>Audio files: <input type="file" id="multiAudios" accept="audio/*" multiple onchange="addAudioFiles(this.files)"></p>
      <div id="languageInputs"></div>
    </div>

    <div id="multiUrlSection" style="display: none;">
      <p>Video URL: <input type="text" id="multiVideoUrl" placeholder="https://example.com/video.mp4" style="width: 100%;"></p>
      <p>Audio Tracks (JSON):</p>
      <textarea id="multiAudioTracksJson" rows="8" style="width: 100%; font-family: monospace; font-size: 12px;" placeholder='[
  {
    "language": "es-ES",
    "audioUrl": "https://example.com/spanish.mp3"
  },
  {
    "language": "fr-FR",
    "audioUrl": "https://example.com/french.mp3"
  }
]'></textarea>
    </div>

    <button type="button" onclick="callMergeMulti()">POST /test/merge-multi</button>

  </div>

  <div class="response-col">
    <h3>Response:</h3>
    <pre id="output">No requests yet...</pre>
    <div id="videoLink"></div>
  </div>

</div>

<script>
const SERVER = 'http://localhost:8080';
const output = document.getElementById('output');
const videoLink = document.getElementById('videoLink');

// Toggle functions for single merge
function toggleSingleMode() {
  const mode = document.querySelector('input[name="singleMode"]:checked').value;
  document.getElementById('singleUploadSection').style.display = mode === 'upload' ? 'block' : 'none';
  document.getElementById('singleUrlSection').style.display = mode === 'url' ? 'block' : 'none';
}

// Toggle functions for multi merge
function toggleMultiMode() {
  const mode = document.querySelector('input[name="multiMode"]:checked').value;
  document.getElementById('multiUploadSection').style.display = mode === 'upload' ? 'block' : 'none';
  document.getElementById('multiUrlSection').style.display = mode === 'url' ? 'block' : 'none';
}

// Debug: Log if page is trying to reload
window.addEventListener('beforeunload', function(e) {
  console.log('⚠️ WARNING: Page is trying to unload/reload!');
});

// Debug: Log when page loads
console.log('✓ Page loaded successfully');

// Add event listener to button instead of onclick
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM loaded, attaching event listeners');
  
  const mergeBtn = document.getElementById('mergeBtn');
  if (mergeBtn) {
    mergeBtn.addEventListener('click', async function(e) {
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      console.log('Button clicked via addEventListener');
      
      output.textContent = 'Processing...';
      videoLink.style.display = 'none';
      
      const mode = document.querySelector('input[name="singleMode"]:checked').value;
      const language = document.getElementById('oneLanguage').value;

      console.log('Mode:', mode);

      if (mode === 'upload') {
        // Upload mode
        const videoFile = document.getElementById('oneVideo').files[0];
        const audioFile = document.getElementById('oneAudio').files[0];

        if (!videoFile || !audioFile) {
          output.textContent = 'Please select both a video and an audio file.';
          return;
        }

        const formData = new FormData();
        formData.append('video', videoFile);
        formData.append('audio', audioFile);
        formData.append('language', language);
        formData.append('outputName', `merged_${language}_${Date.now()}.mp4`);

        try {
          output.textContent = 'Uploading and processing...';
          console.log('Sending upload request...');
          const res = await fetch(SERVER + '/test/merge-one-upload', { method: 'POST', body: formData });
          console.log('Got response:', res.status);
          const result = await res.json();
          console.log('Result:', result);
          
          show(result);
          
          if (result.status === 'success' && result.outputUrl) {
            showVideoLink(result.outputUrl, result.outputFile);
          }
        } catch (err) { 
          console.error('Error:', err);
          showError(err);
        }
      } else {
        // URL mode
        const videoUrl = document.getElementById('oneVideoUrl').value.trim();
        const audioUrl = document.getElementById('oneAudioUrl').value.trim();

        if (!videoUrl || !audioUrl) {
          output.textContent = 'Please provide both video URL and audio URL.';
          return;
        }

        const body = {
          videoUrl,
          audioUrl,
          outputName: `merged_${language}_${Date.now()}.mp4`
        };

        try {
          output.textContent = 'Downloading and processing...\nThis may take a while for large files...';
          console.log('Sending URL request...');
          const res = await fetch(SERVER + '/test/merge-one', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          console.log('Got response:', res.status);
          const result = await res.json();
          console.log('Result:', result);
          
          show(result);
          
          if (result.status === 'success' && result.outputUrl) {
            showVideoLink(result.outputUrl, result.outputFile);
          }
        } catch (err) { 
          console.error('Error:', err);
          showError(err);
        }
      }
      
      console.log('Request completed');
    }, false);
    console.log('✓ Event listener attached to merge button');
  }
});

function show(data) {
  output.textContent = JSON.stringify(data, null, 2);
}

function showError(err) {
  output.textContent = 'Error: ' + err.message;
  videoLink.style.display = 'none';
}

function showVideoLink(url, filename) {
  videoLink.innerHTML = `
    <strong>✓ Success!</strong><br><br>
    <strong>Download/View:</strong><br>
    <a href="${url}" target="_blank">${url}</a>
  `;
  videoLink.style.display = 'block';
}

async function callHealth() {
  console.log('callHealth() started');
  output.textContent = 'Calling /health...';
  videoLink.style.display = 'none';
  try {
    const res = await fetch(SERVER + '/health');
    show(await res.json());
  } catch (err) { showError(err); }
}

async function callMergeOne(e) {
  console.log('callMergeOne() started', e);
  if (e) {
    e.preventDefault();
    e.stopPropagation();
  }
  
  output.textContent = 'Calling /test/merge-one-upload...';
  videoLink.style.display = 'none';
  
  const videoFile = document.getElementById('oneVideo').files[0];
  const audioFile = document.getElementById('oneAudio').files[0];
  const language = document.getElementById('oneLanguage').value;

  console.log('Files:', videoFile, audioFile);

  if (!videoFile || !audioFile) {
    output.textContent = 'Please select both a video and an audio file.';
    return false;
  }

  const formData = new FormData();
  formData.append('video', videoFile);
  formData.append('audio', audioFile);
  formData.append('language', language);
  formData.append('outputName', `merged_${language}_${Date.now()}.mp4`);

  try {
    output.textContent = 'Uploading and processing...';
    console.log('Sending fetch request...');
    const res = await fetch(SERVER + '/test/merge-one-upload', { method: 'POST', body: formData });
    console.log('Got response:', res.status);
    const result = await res.json();
    console.log('Result:', result);
    
    show(result);
    
    if (result.status === 'success' && result.outputUrl) {
      showVideoLink(result.outputUrl, result.outputFile);
    }
  } catch (err) { 
    console.error('Error:', err);
    showError(err);
  }
  
  console.log('callMergeOne() finished');
  return false;
}

const LANGUAGE_OPTIONS = [
  { value: 'en-US', label: 'English' },
  { value: 'es-ES', label: 'Spanish' },
  { value: 'fr-FR', label: 'French' },
  { value: 'zh-CN', label: 'Chinese' },
  { value: 'ko-KR', label: 'Korean' },
  { value: 'ja-JP', label: 'Japanese' },
  { value: 'pt-PT', label: 'Portuguese' },
  { value: 'pt-BR', label: 'Brazilian Portuguese' },
  { value: 'fil-PH', label: 'Filipino' },
];

let multiAudioFiles = [];

function addAudioFiles(fileList) {
  for (const file of fileList) {
    multiAudioFiles.push({ file, language: LANGUAGE_OPTIONS[multiAudioFiles.length % LANGUAGE_OPTIONS.length].value });
  }
  document.getElementById('multiAudios').value = '';
  renderLanguageInputs();
}

function removeAudioFile(index) {
  multiAudioFiles.splice(index, 1);
  renderLanguageInputs();
}

function renderLanguageInputs() {
  const container = document.getElementById('languageInputs');
  container.innerHTML = '';

  multiAudioFiles.forEach((entry, i) => {
    const row = document.createElement('p');

    const label = document.createElement('span');
    label.textContent = entry.file.name + '  ';
    row.appendChild(label);

    const select = document.createElement('select');
    select.className = 'lang-select';
    select.dataset.index = i;
    LANGUAGE_OPTIONS.forEach((opt) => {
      const option = document.createElement('option');
      option.value = opt.value;
      option.textContent = opt.label;
      if (opt.value === entry.language) option.selected = true;
      select.appendChild(option);
    });
    select.onchange = () => { entry.language = select.value; };
    row.appendChild(select);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = () => removeAudioFile(i);
    row.appendChild(removeBtn);

    container.appendChild(row);
  });
}

async function callMergeMulti() {
  output.textContent = 'Processing...';
  videoLink.style.display = 'none';
  
  const mode = document.querySelector('input[name="multiMode"]:checked').value;

  if (mode === 'upload') {
    // Upload mode
    const videoFile = document.getElementById('multiVideo').files[0];

    if (!videoFile || multiAudioFiles.length === 0) {
      output.textContent = 'Pick a video and at least one audio file first.';
      return;
    }

    const formData = new FormData();
    formData.append('video', videoFile);
    const languages = [];
    for (const entry of multiAudioFiles) {
      formData.append('audios', entry.file);
      languages.push(entry.language);
    }
    formData.append('languages', JSON.stringify(languages));

    try {
      output.textContent = `Processing ${multiAudioFiles.length} audio tracks...`;
      const res = await fetch(SERVER + '/test/merge-multiple-upload', { method: 'POST', body: formData });
      const result = await res.json();
      show(result);
      
      // Show download links if successful
      if ((result.status === 'success' || result.status === 'partial') && result.results) {
        let linksHtml = '<br><br><strong>Download Links:</strong><br>';
        result.results.forEach(r => {
          linksHtml += `<a href="${r.outputUrl}" target="_blank" style="display:block; margin:5px 0;">${r.language}: ${r.outputFile}</a>`;
        });
        output.innerHTML = output.textContent + linksHtml;
      }
    } catch (err) { showError(err); }
  } else {
    // URL mode
    const videoUrl = document.getElementById('multiVideoUrl').value.trim();
    const audioTracksText = document.getElementById('multiAudioTracksJson').value.trim();

    if (!videoUrl || !audioTracksText) {
      output.textContent = 'Please provide video URL and audio tracks JSON.';
      return;
    }

    let audioTracks;
    try {
      audioTracks = JSON.parse(audioTracksText);
    } catch (err) {
      output.textContent = 'Error: Invalid JSON in audio tracks field\n' + err.message;
      return;
    }

    if (!Array.isArray(audioTracks) || audioTracks.length === 0) {
      output.textContent = 'Error: Audio tracks must be a non-empty array';
      return;
    }

    const body = {
      videoUrl,
      audioTracks
    };

    try {
      output.textContent = `Downloading and processing ${audioTracks.length} audio tracks...\nThis may take several minutes...`;
      const res = await fetch(SERVER + '/test/merge-multiple', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      
      const result = await res.json();
      show(result);
      
      // Show download links if successful
      if ((result.status === 'success' || result.status === 'partial') && result.results) {
        let linksHtml = '<br><br><strong>Download Links:</strong><br>';
        result.results.forEach(r => {
          linksHtml += `<a href="${r.outputUrl}" target="_blank" style="display:block; margin:5px 0;">${r.language}: ${r.outputFile}</a>`;
        });
        output.innerHTML = output.textContent + linksHtml;
      }
    } catch (err) { showError(err); }
  }
}
</script>

</body>
</html>
